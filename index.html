<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وردة استوديو | Wardah Studio</title>
    <meta name="description" content="وردة استوديو - استوديو هوية بصرية وعلامات تجارية في المملكة العربية السعودية.">
    <link rel="preload" as="image" href="background.png" fetchpriority="high">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Fixed Navbar -->
    <nav id="navbar" class="navbar fade-up">
        <div class="nav-container">
            <div class="nav-brand">وردة استوديو</div>
            <div class="nav-copy">المملكة العربية السعودية — ٢٠٢٦©</div>
        </div>
    </nav>

    <!-- Section 1: Hero Splash -->
    <header class="hero section fade-up">
        <div class="scroll-indicator">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 5v14M19 12l-7 7-7-7"/>
            </svg>
        </div>
    </header>

    <!-- Section 3: Our Partners -->
    <section class="partners section fade-up">
        <h2 class="partners-title">شركاؤنا</h2>
        <div class="marquee-wrapper">
            <div class="marquee-track">
                <div class="marquee" id="marquee-content">
                    <!-- Logos -->
                    <div class="partner-logo"></div>
                    <div class="partner-logo"></div>
                    <div class="partner-logo"></div>
                    <div class="partner-logo"></div>
                    <div class="partner-logo"></div>
                    <div class="partner-logo"></div>
                    <div class="partner-logo"></div>
                </div>
                <!-- Duplicate for infinite scroll -->
                <div class="marquee" aria-hidden="true">
                    <div class="partner-logo"></div>
                    <div class="partner-logo"></div>
                    <div class="partner-logo"></div>
                    <div class="partner-logo"></div>
                    <div class="partner-logo"></div>
                    <div class="partner-logo"></div>
                    <div class="partner-logo"></div>
                </div>
            </div>
        </div>
    </section>
    <!-- Section 2: Our Works (Horizontal Scroll Gallery) -->
    <section class="works section fade-up">
        <div class="container">
            <h2 class="section-title">أعمالنا</h2>
            <!-- The horizontal scroll container -->
            <div class="works-scroll-wrapper">
                <div class="works-sticky">
                    <div class="works-gallery" id="works-gallery">
                        <!-- Cards are dynamically injected via script.js for maximum performance -->
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer fade-up">
        <div class="footer-content">
            <img src="logo.jpg" alt="وردة استوديو Logo" class="footer-logo">
            
            <div class="footer-socials">
                <span class="social-divider">/</span>
                <a href="#" class="social-link">تواصل معنا</a>
                <span class="social-divider">/</span>
                <a href="https://www.instagram.com/wardh.studio" class="social-link" target="_blank" rel="noopener noreferrer">انستقرام</a>
                <span class="social-divider">/</span>
                <a href="#" class="social-link" target="_blank">اكس</a>
                <span class="social-divider">/</span>
                <a href="https://www.tiktok.com/@wardh.studio" class="social-link" target="_blank" rel="noopener noreferrer">تيك توك</a>
                <span class="social-divider">/</span>
                <a href="#" class="social-link" target="_blank">لينكدإن</a>
                <span class="social-divider">/</span>
                <a href="#" class="social-link" target="_blank">بينتريست</a>
                <span class="social-divider">/</span>
                <a href="https://api.whatsapp.com/message/VXNYV5SYHBCCJ1?autoload=1&app_absent=0" class="social-link" target="_blank" rel="noopener noreferrer">واتساب</a>
                <span class="social-divider">/</span>
            </div>

            <p class="footer-text">المملكة العربية السعودية — ٢٠٢٦© — جميع الحقوق محفوظة</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
